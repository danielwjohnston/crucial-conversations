  <script>
    function setSpeed(btn, rate) {
      var player = btn.closest('.audio-player');
      var audio = player.querySelector('audio');
      audio.playbackRate = rate;
      player.querySelectorAll('.speed-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
    }
    function toggleTheme() {
      var html = document.documentElement;
      var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      try { localStorage.setItem('cc-theme', next); } catch (e) {}
    }
    (function() {
      try { if (localStorage.getItem('cc-theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); } catch(e) {}
    })();
  </script>
